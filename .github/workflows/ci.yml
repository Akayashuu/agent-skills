name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate skills and type-check artifacts
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Validate SKILL.md frontmatter and JSON files
        run: node scripts/validate-skills.mjs

      - name: Install harness dependencies
        working-directory: tests
        run: pnpm install --frozen-lockfile

      - name: Type-check / compile skill code artifacts
        working-directory: tests
        run: node run.mjs

  php-lint:
    name: Lint PHP skill examples
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      # shivammathur/setup-php@v2
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.1'

      - name: Syntax-check skill .php examples
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' file; do
            found=1
            php -l "$file"
          done < <(find skills -path '*/examples/*.php' -print0)
          if [ "$found" -eq 0 ]; then
            echo "No PHP examples found" >&2
            exit 1
          fi

  go-lint:
    name: Compile Go skill examples
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      # actions/setup-go@v5.0.2
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: '1.22'

      - name: Build each Go example as its own package
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' file; do
            found=1
            dir=$(mktemp -d)
            cp "$file" "$dir/main.go"
            ( cd "$dir" && go mod init example >/dev/null 2>&1 && go build ./... )
            rm -rf "$dir"
          done < <(find skills -path '*/examples/*.go' -print0)
          if [ "$found" -eq 0 ]; then
            echo "No Go examples found" >&2
            exit 1
          fi

  rust-lint:
    name: Type-check Rust skill examples
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Type-check each Rust example as a library crate
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' file; do
            found=1
            rustc --edition 2021 --crate-type lib --emit=metadata -o /dev/null "$file"
          done < <(find skills -path '*/examples/*.rs' -print0)
          if [ "$found" -eq 0 ]; then
            echo "No Rust examples found" >&2
            exit 1
          fi
